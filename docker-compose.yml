services:
  postgres:
    image: postgres:16-alpine

    container_name: devinsight-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: devinsight

      POSTGRES_PASSWORD: devinsight123

      POSTGRES_DB: devinsight_dev

      TZ: Europe/Warsaw

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devinsight"]
      interval: 10s
      timeout: 5s
      retries: 5

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: devinsight-network
